<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데자이언츠 유니폼 전 종 아카이브</title>
    <style>
        :root { --lotte-red: #d31145; --lotte-navy: #002c5f; --lotte-gold: #b29d6c; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        header { background: linear-gradient(135deg, var(--lotte-navy), #004aa0); color: white; padding: 50px 20px; text-align: center; border-radius: 15px; margin-bottom: 30px; border-bottom: 5px solid var(--lotte-red); }
        .nav-bar { position: sticky; top: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .filter-btn { padding: 10px 18px; border: 1px solid #ddd; border-radius: 25px; background: white; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .filter-btn.active { background: var(--lotte-red); color: white; border-color: var(--lotte-red); }
        .list-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 20px; text-align: left; border-bottom: 2px solid #eee; color: var(--lotte-navy); }
        td { padding: 20px; border-bottom: 1px solid #eee; vertical-align: top; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 8px; }
        .bg-정규 { background: #333; } .bg-올드 { background: var(--lotte-gold); } .bg-선데이 { background: #ff9800; }
        .bg-밀리터리 { background: #4b5320; } .bg-유니세프 { background: #00adef; } .bg-동백 { background: var(--lotte-red); }
        .bg-콜라보 { background: #ff69b4; } .bg-기념 { background: var(--lotte-navy); } .bg-기타 { background: #777; }
        .year-text { font-weight: 800; color: #444; font-size: 14px; }
        .name-text { font-weight: 700; font-size: 17px; color: #111; display: block; margin-bottom: 8px; }
        .desc-text { font-size: 14px; color: #555; line-height: 1.6; }
        tr:hover { background-color: #fff9fa; }
    </style>
</head>
<body>

<header>
    <h1>GIANTS UNIFORM ENCYCLOPEDIA</h1>
    <p>1982-2025 롯데자이언츠 역대 유니폼 62종 전수 조사</p>
</header>

<div class="nav-bar">
    <button class="filter-btn active" data-filter="전체">전체 (62)</button>
    <button class="filter-btn" data-filter="정규">정규</button>
    <button class="filter-btn" data-filter="올드">올드</button>
    <button class="filter-btn" data-filter="선데이">선데이</button>
    <button class="filter-btn" data-filter="밀리터리">밀리터리</button>
    <button class="filter-btn" data-filter="유니세프">유니세프</button>
    <button class="filter-btn" data-filter="동백">동백</button>
    <button class="filter-btn" data-filter="콜라보">콜라보</button>
    <button class="filter-btn" data-filter="기념">기념</button>
    <button class="filter-btn" data-filter="기타">기타</button>
</div>

<div class="list-container">
    <table>
        <thead>
            <tr>
                <th width="15%">연도/분류</th>
                <th width="30%">유니폼 명칭</th>
                <th width="55%">상세 특징 및 역사</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    const data = [
        /* 정규 (3종) */
        { cat: "정규", year: "현행 시즌", name: "홈 유니폼", desc: "2024년 리뉴얼된 VI 반영. 강렬한 레드 워드마크와 화이트 베이스의 조화." },
        { cat: "정규", year: "현행 시즌", name: "원정 유니폼 (회색)", desc: "클래식한 그레이 컬러에 네이비 포인트를 주어 프로페셔널함 강조." },
        { cat: "정규", year: "2017~", name: "원정 유니폼 (블랙)", desc: "세련된 다크 네이비/블랙 톤으로 팬들 사이에서 인기가 높은 얼터 원정복." },

        /* 올드 (8종) */
        { cat: "올드", year: "2006~2011", name: "챔피언스 데이 원정 유니폼", desc: "추억의 하늘색 스카이블루 디자인. 창단 초기 로고 복원." },
        { cat: "올드", year: "2012~2019", name: "챔피언스 데이 홈 유니폼", desc: "V1, V2 시절의 화이트 클래식 디자인을 재해석한 모델." },
        { cat: "올드", year: "2016~2020", name: "챔피언스 데이 원정 (2차)", desc: "하늘색 톤을 유지하며 소재와 패치를 현대적으로 개선한 버전." },
        { cat: "올드", year: "2021", name: "Giants 홈 유니폼", desc: "필기체 로고를 사용한 80년대 후반 스타일의 완벽한 복사판." },
        { cat: "올드", year: "2022", name: "창단 40주년 친환경 주말 홈", desc: "리사이클 소재 활용. 40주년 특별 패치가 부착된 기념비적 유니폼." },
        { cat: "올드", year: "2023~2024", name: "올드 유니폼 (화이트)", desc: "현재의 기술로 복원한 화이트 클래식. 깔끔한 배색이 특징." },
        { cat: "올드", year: "2023~2024", name: "올드 유니폼 (블랙)", desc: "블랙 베이스에 골드 자수로 고급스러움을 극대화한 올드 리뉴얼." },
        { cat: "올드", year: "2025~", name: "올드 유니폼 (최신)", desc: "가장 최근의 클래식 복원 모델로 비율과 자수 퀄리티 상향." },

        /* 선데이 (2종) */
        { cat: "선데이", year: "2005~2011", name: "선데이 유니폼", desc: "일요일 홈 경기 전용. 강렬한 오렌지/레드 배색 포인트." },
        { cat: "선데이", year: "2012~2017", name: "선데이 유니폼 (리뉴얼)", desc: "어깨 라인과 로고 테두리를 다듬어 세련미를 더한 일요일 전용복." },

        /* 밀리터리 (10종) */
        { cat: "밀리터리", year: "2008~2012", name: "밀리터리 유니폼 (초기)", desc: "호국보훈의 달 기념. 국방색 카모플라 패턴 도입." },
        { cat: "밀리터리", year: "2013~2014", name: "밀리터리 (리뉴얼)", desc: "카모 패턴의 밀도를 높이고 구단 로고와의 시인성 개선." },
        { cat: "밀리터리", year: "2015", name: "밀리터리 2015", desc: "사막색 톤을 섞은 새로운 카모 디자인 적용." },
        { cat: "밀리터리", year: "2016", name: "밀리터리 2016", desc: "디지털 무늬를 차용하여 현대 군복 느낌 강조." },
        { cat: "밀리터리", year: "2017", name: "밀리터리 2017", desc: "그린 톤을 강화한 정통 밀리터리 룩." },
        { cat: "밀리터리", year: "2018", name: "밀리터리 2018", desc: "어깨 라인에만 카모 포인트를 준 세미 밀리터리 스타일." },
        { cat: "밀리터리", year: "2019~2021", name: "밀리터리 (해군)", desc: "대한민국 해군 정복 모티브. 네이비와 화이트의 정갈한 조화." },
        { cat: "밀리터리", year: "2022", name: "밀리터리 2022", desc: "다시 강렬한 디지털 카모로 회귀한 저항적 디자인." },
        { cat: "밀리터리", year: "2023", name: "밀리터리 (공군)", desc: "공군 비행복 세이지 그린 컬러 차용. 독보적인 색감." },
        { cat: "밀리터리", year: "2024~", name: "G 밀리터리 (화이트)", desc: "화이트 카모 패턴으로 밝고 경쾌한 군 관련 테마 구현." },

        /* 유니세프 (4종) */
        { cat: "유니세프", year: "2011~2017", name: "유니세프 유니폼", desc: "사회공헌 협약 기념. 유니세프 고유의 블루 컬러 포인트." },
        { cat: "유니세프", year: "2018~2019", name: "유니세프 (리뉴얼)", desc: "로고 배치와 폰트를 현대적으로 수정한 사회공헌 유니폼." },
        { cat: "유니세프", year: "2021~2023", name: "유니세프 10주년 기념", desc: "10주년 특별 패치와 골드 포인트가 가미된 에디션." },
        { cat: "유니세프", year: "2024", name: "유니세프 2024", desc: "가장 최신의 사회공헌 모델. 깔끔한 블루 워드마크." },

        /* 동백 (8종) */
        { cat: "동백", year: "2017", name: "동백 유니폼 (최초)", desc: "부산 시화 동백꽃 상징. 레드 컬러 대유행의 시작." },
        { cat: "동백", year: "2018", name: "동백 유니폼 (리뉴얼)", desc: "채도를 조정한 강렬한 레드와 화이트 배색." },
        { cat: "동백", year: "2018", name: "팬사랑 페스티벌", desc: "관중 전원 증정 이벤트 유니폼의 시초." },
        { cat: "동백", year: "2019", name: "팬사랑 페스티벌 2019", desc: "체크 패턴 등을 가미한 실험적 동백 디자인." },
        { cat: "동백", year: "2022", name: "동백 에디션 2022", desc: "사직 야구장을 붉게 물들인 정통 동백 스타일." },
        { cat: "동백", year: "2023", name: "동백 에디션 2023", desc: "디테일을 살린 자수와 로고 업그레이드." },
        { cat: "동백", year: "2024", name: "바다 유니폼 (스카이블루)", desc: "부산 바다 테마. 시원한 하늘색 동백 변형 모델." },
        { cat: "동백", year: "2025", name: "2025 신형 동백", desc: "윌비플레이 협업 최신형 동백 유니폼." },

        /* 콜라보 (11종) */
        { cat: "콜라보", year: "2016", name: "도라에몽 콜라보", desc: "도라에몽 캐릭터 컬러와 구단 로고의 귀여운 만남." },
        { cat: "콜라보", year: "2017", name: "몬스터 설리", desc: "픽사 몬스터 주식회사 설리 테마. 민트색 포인트." },
        { cat: "콜라보", year: "2017", name: "챔피언 마이크", desc: "마이크 와조스키 캐릭터 테마. 연두색 포인트." },
        { cat: "콜라보", year: "2018", name: "보노보노", desc: "보노보노 캐릭터 패치와 파스텔 블루 조화." },
        { cat: "콜라보", year: "2018", name: "시로앤마로", desc: "인기 강아지 캐릭터 시로앤마로 자수 삽입." },
        { cat: "콜라보", year: "2018", name: "S&M 마로", desc: "마로 캐릭터 중심의 한정판 콜라보 디자인." },
        { cat: "콜라보", year: "2021", name: "스머프", desc: "스머프 캐릭터를 활용한 블루 테마 유니폼." },
        { cat: "콜라보", year: "2024", name: "짱구는 못말려", desc: "흰색 바탕에 짱구 캐릭터 자수가 들어간 베스트셀러." },
        { cat: "콜라보", year: "2024", name: "짱구 × 초코비 (그린)", desc: "초코비 과자 상자 테마의 파격적인 그린 컬러." },
        { cat: "콜라보", year: "2024", name: "에스더버니 (스카이블루)", desc: "여성 팬들에게 인기 높았던 에스더버니 협업 모델." },
        { cat: "콜라보", year: "2025", name: "포켓몬스터 (피카츄)", desc: "2025년 최고의 화제작. 피카츄 테마의 옐로우 포인트." },

        /* 기념 (11종) */
        { cat: "기념", year: "2020", name: "이대호 20번째 시즌 기념", desc: "전설의 시작을 기념하는 골드 패치 유니폼." },
        { cat: "기념", year: "2020", name: "오윤석 사이클링 히트", desc: "역사적 기록 달성을 기념한 메모리얼 에디션." },
        { cat: "기념", year: "2022", name: "이대호 은퇴 기념", desc: "배번 10번 영구결번 확정 및 은퇴 헌정 디자인." },
        { cat: "기념", year: "2023", name: "구승민 100홀드 기념", desc: "구단 최초 100홀드 달성 기념 한정판." },
        { cat: "기념", year: "2023", name: "김원중 100세이브 기념", desc: "구단 최다 세이브 기록 경신 기념 모델." },
        { cat: "기념", year: "2023", name: "정훈 1000안타 기념", desc: "베테랑 정훈의 1000안타 달성 축하 에디션." },
        { cat: "기념", year: "2024", name: "전준우 200홈런 기념", desc: "캡틴 전준우의 장타력을 상징하는 기념복." },
        { cat: "기념", year: "2024", name: "고승민 사이클링히트", desc: "차세대 스타 고승민의 대기록 달성 기념." },
        { cat: "기념", year: "2024", name: "레이예스 최다안타 기념", desc: "단일시즌 202안타 경신 기념 블랙/골드 에디션." },
        { cat: "기념", year: "2025", name: "전준우 2000안타/1000타점", desc: "리빙 레전드 전준우의 누적 기록 헌정 유니폼." },
        { cat: "기념", year: "2025", name: "김원중 150세이브 기념", desc: "클로저 김원중의 새로운 역사 달성 기념복." },

        /* 기타 (5종) */
        { cat: "기타", year: "2010", name: "유니폼 위크 연습복", desc: "선수단 훈련용으로 제작되었다가 팬들의 요청으로 출시." },
        { cat: "기타", year: "2019", name: "썸머 유니폼", desc: "여름 혹서기 전용 통기성 강화 소재 디자인." },
        { cat: "기타", year: "2020", name: "광안대교 유니폼", desc: "부산의 랜드마크를 유니폼 전면에 형상화." },
        { cat: "기타", year: "2021", name: "라이징 스타 스페셜", desc: "유망주 선수들을 응원하기 위해 제작된 특별복." },
        { cat: "기타", year: "2025", name: "가나초콜릿 콜라보", desc: "브라운 컬러 테마의 달콤한 이색 콜라보 모델." }
    ];

    const listBody = document.getElementById('list-body');
    const btns = document.querySelectorAll('.filter-btn');

    function render(filter = '전체') {
        listBody.innerHTML = '';
        const filtered = filter === '전체' ? data : data.filter(u => u.cat.includes(filter));
        
        filtered.forEach(u => {
            const tr = `
                <tr>
                    <td>
                        <span class="badge bg-${u.cat}">${u.cat}</span><br>
                        <span class="year-text">${u.year}</span>
                    </td>
                    <td><span class="name-text">${u.name}</span></td>
                    <td><span class="desc-text">${u.desc}</span></td>
                </tr>
            `;
            listBody.insertAdjacentHTML('beforeend', tr);
        });
    }

    btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.getAttribute('data-filter'));
        });
    });

    render();
</script>

</body>
</html>
