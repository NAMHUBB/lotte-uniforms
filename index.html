<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데자이언츠 유니폼 아카이브</title>
    <style>
        :root { --lotte-red: #d31145; --lotte-navy: #002c5f; --lotte-gold: #b29d6c; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; line-height: 1.4; }
        
        header { background: linear-gradient(135deg, var(--lotte-navy), #004aa0); color: white; padding: 30px 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; border-bottom: 5px solid var(--lotte-red); }
        header h1 { margin: 0; font-size: 1.6rem; letter-spacing: -1px; }
        header p { font-size: 0.85rem; margin-top: 5px; opacity: 0.8; }

        /* 필터 영역 */
        .filter-section { position: sticky; top: 10px; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 12px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filter-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .filter-group:last-child { margin-bottom: 0; border-top: 1px solid #eee; padding-top: 10px; }
        
        .filter-label { font-size: 11px; font-weight: bold; color: var(--lotte-navy); width: 100%; text-align: center; margin-bottom: 4px; }
        .filter-btn { padding: 5px 10px; border: 1px solid #ddd; border-radius: 15px; background: white; cursor: pointer; font-weight: 600; font-size: 11px; transition: 0.2s; }
        .filter-btn.active { background: var(--lotte-red); color: white; border-color: var(--lotte-red); }

        /* 테이블 영역 */
        .list-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 750px; table-layout: fixed; }
        th { background: #f8f9fa; padding: 12px 15px; text-align: left; border-bottom: 2px solid #eee; color: var(--lotte-navy); font-size: 12px; }
        th.sortable { cursor: pointer; background: #edf0f5; position: relative; }
        th.sortable:hover { background: #dfe4ed; color: var(--lotte-red); }
        th.sortable::after { content: ' ↕'; font-size: 10px; opacity: 0.5; }

        td { padding: 10px 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; color: white; vertical-align: middle; min-width: 50px; text-align: center; }
        .year-text { font-weight: 700; color: #666; font-size: 11px; margin-left: 8px; }
        .name-text { font-weight: 700; font-size: 13px; color: #111; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .desc-text { font-size: 12px; color: #555; white-space: normal; line-height: 1.5; }

        /* 카테고리 색상 */
        .bg-정규 { background: #333; } .bg-올드 { background: var(--lotte-gold); } .bg-선데이 { background: #ff9800; }
        .bg-밀리터리 { background: #4b5320; } .bg-유니세프 { background: #00adef; } .bg-동백 { background: var(--lotte-red); }
        .bg-콜라보 { background: #ff69b4; } .bg-기념 { background: var(--lotte-navy); } .bg-기타 { background: #777; }

        #topBtn { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; background: var(--lotte-navy); color: white; border: none; border-radius: 50%; cursor: pointer; display: none; z-index: 1001; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; line-height: 40px; text-align: center; }
        #topBtn:hover { background: var(--lotte-red); }
        tr:hover { background-color: #fff9fa; }
    </style>
</head>
<body>

<header>
    <h1>LOTTE GIANTS UNIFORM ENCYCLOPEDIA</h1>
    <p>1982-2025</p>
</header>

<div class="filter-section">
    <div class="filter-label">종류별 필터</div>
    <div class="filter-group" id="cat-filters">
        <button class="filter-btn active" data-cat="전체">전체</button>
        <button class="filter-btn" data-cat="정규">정규</button>
        <button class="filter-btn" data-cat="올드">올드</button>
        <button class="filter-btn" data-cat="선데이">선데이</button>
        <button class="filter-btn" data-cat="밀리터리">밀리터리</button>
        <button class="filter-btn" data-cat="유니세프">유니세프</button>
        <button class="filter-btn" data-cat="동백">동백</button>
        <button class="filter-btn" data-cat="콜라보">콜라보</button>
        <button class="filter-btn" data-cat="기념">기념</button>
        <button class="filter-btn" data-cat="기타">기타</button>
    </div>
    <div class="filter-label">시기별 필터</div>
    <div class="filter-group" id="year-filters">
        <button class="filter-btn active" data-year="전체">전체 연도</button>
        <button class="filter-btn" data-year="2025">2025</button>
        <button class="filter-btn" data-year="2024">2024</button>
        <button class="filter-btn" data-year="2023">2023</button>
        <button class="filter-btn" data-year="2022">2022</button>
        <button class="filter-btn" data-year="2021">2021</button>
        <button class="filter-btn" data-year="이전">2021 이전</button>
    </div>
</div>

<div class="list-container">
    <table>
        <thead>
            <tr>
                <th class="sortable" onclick="handleSort()" style="width: 130px;">분류/연도 (정렬)</th>
                <th style="width: 230px;">유니폼 명칭</th>
                <th>상세 특징 및 역사</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<script>
    const data = [
        /* 정규 */
        { cat: "정규", year: "2024", name: "홈 유니폼 (윌비플레이)", desc: "2024 신규 VI 적용. 레드 워드마크와 화이트 베이스." },
        { cat: "정규", year: "2024", name: "원정 유니폼 (그레이)", desc: "전통적 원정 그레이 컬러. 윌비플레이 제조." },
        { cat: "정규", year: "2017", name: "원정 유니폼 (다크네이비)", desc: "인기 높은 블랙 계열 얼터 원정복." },
        /* 올드 */
        { cat: "올드", year: "1982", name: "창단 홈 유니폼", desc: "원년 창단 유니폼. 하늘색 배색 포인트." },
        { cat: "올드", year: "1984", name: "V1 우승 기념 홈", desc: "첫 우승 당시 필기체 로고 모델." },
        { cat: "올드", year: "1992", name: "V2 우승 기념 홈", desc: "두 번째 우승 당시 단추형 디자인." },
        { cat: "올드", year: "2006", name: "챔피언스 데이 원정", desc: "스카이블루 복고풍 디자인의 시작." },
        { cat: "올드", year: "2012", name: "챔피언스 데이 홈", desc: "클래식 디자인 현대적 재해석." },
        { cat: "올드", year: "2021", name: "Giants 필기체 복원", desc: "80년대 스타일 완벽 복원판." },
        { cat: "올드", year: "2022", name: "40주년 친환경 홈", desc: "창단 40주년 기념 에디션." },
        { cat: "올드", year: "2023", name: "올드 화이트", desc: "깔끔한 배색의 최신 복원 모델." },
        { cat: "올드", year: "2024", name: "올드 블랙", desc: "블랙/골드 조합 프리미엄 올드." },
        { cat: "올드", year: "2025", name: "25년형 올드 리뉴얼", desc: "소재와 핏이 개선된 최신형 클래식." },
        /* 선데이 */
        { cat: "선데이", year: "2005", name: "선데이 초기형", desc: "일요일 전용 오렌지 포인트." },
        { cat: "선데이", year: "2012", name: "선데이 리뉴얼", desc: "로고 테두리 정돈 및 세련미 강화." },
        /* 밀리터리 */
        { cat: "밀리터리", year: "2008", name: "밀리터리 1세대", desc: "국방색 카모 패턴 최초 도입." },
        { cat: "밀리터리", year: "2013", name: "밀리터리 디지털", desc: "현대 군복 느낌의 디지털 카모." },
        { cat: "밀리터리", year: "2015", name: "밀리터리 2015", desc: "사막색 톤 혼합 디자인." },
        { cat: "밀리터리", year: "2016", name: "밀리터리 2016", desc: "디테일이 강화된 픽셀 카모." },
        { cat: "밀리터리", year: "2017", name: "밀리터리 2017", desc: "정통 그린 카모 스타일." },
        { cat: "밀리터리", year: "2018", name: "밀리터리 2018", desc: "어깨 라인 포인트 디자인." },
        { cat: "밀리터리", year: "2019", name: "해군 밀리터리", desc: "해군 정복 모티브 네이비 디자인." },
        { cat: "밀리터리", year: "2022", name: "밀리터리 2022", desc: "강렬한 카모 패턴 회귀." },
        { cat: "밀리터리", year: "2023", name: "공군 밀리터리", desc: "공군 비행복 세이지 그린 컬러." },
        { cat: "밀리터리", year: "2024", name: "G 밀리터리 화이트", desc: "화이트 카모 최신형 모델." },
        /* 유니세프 */
        { cat: "유니세프", year: "2011", name: "유니세프 초기", desc: "사회공헌 협약 기념 블루 포인트." },
        { cat: "유니세프", year: "2018", name: "유니세프 리뉴얼", desc: "로고 및 폰트 현대화 버전." },
        { cat: "유니세프", year: "2021", name: "유니세프 10주년", desc: "10주년 기념 골드 패치 부착." },
        { cat: "유니세프", year: "2024", name: "유니세프 2024", desc: "윌비플레이 VI 적용 최신형." },
        /* 동백 */
        { cat: "동백", year: "2017", name: "동백 최초", desc: "강렬한 레드 컬러 동백 열풍의 시초." },
        { cat: "동백", year: "2018", name: "동백 리뉴얼", desc: "채도 조정 및 배색 개선 버전." },
        { cat: "동백", year: "2018", name: "팬사랑 페스티벌", desc: "관중 배포용 붉은 물결의 주인공." },
        { cat: "동백", year: "2019", name: "팬사랑 2019", desc: "디테일 변형 동백 에디션." },
        { cat: "동백", year: "2022", name: "동백 에디션 2022", desc: "정통 레드 컬러 강조 디자인." },
        { cat: "동백", year: "2023", name: "동백 에디션 2023", desc: "자수 및 패치 퀄리티 업그레이드." },
        { cat: "동백", year: "2024", name: "바다 유니폼 (스카이)", desc: "시원한 하늘색 동백 변형 모델." },
        { cat: "동백", year: "2025", name: "25년형 정통 동백", desc: "최신 VI 적용 레드 동백 유니폼." },
        /* 콜라보 */
        { cat: "콜라보", year: "2016", name: "도라에몽 콜라보", desc: "역대급 인기 캐릭터 협업 시초." },
        { cat: "콜라보", year: "2017", name: "몬스터 설리", desc: "민트 블루 캐릭터 테마 디자인." },
        { cat: "콜라보", year: "2017", name: "챔피언 마이크", desc: "형광 연두 캐릭터 테마 디자인." },
        { cat: "콜라보", year: "2018", name: "보노보노", desc: "파스텔 톤 캐릭터 패치 모델." },
        { cat: "콜라보", year: "2018", name: "시로앤마로", desc: "인기 시바견 캐릭터 이색 협업." },
        { cat: "콜라보", year: "2018", name: "S&M 마로", desc: "마로 캐릭터 중심 한정 에디션." },
        { cat: "콜라보", year: "2021", name: "스머프", desc: "블루 테마 캐릭터 협업 모델." },
        { cat: "콜라보", year: "2024", name: "짱구는 못말려 (화이트)", desc: "24년 최고 히트 콜라보 상품." },
        { cat: "콜라보", year: "2024", name: "짱구 초코비 (그린)", desc: "초코비 상자 테마 파격적 그린." },
        { cat: "콜라보", year: "2024", name: "에스더버니 (스카이)", desc: "화사한 컬러감의 캐릭터 콜라보." },
        { cat: "콜라보", year: "2025", name: "포켓몬 (피카츄)", desc: "25년 신규 옐로우 포인트 모델." },
        { cat: "콜라보", year: "2025", name: "포켓몬 (잠만보)", desc: "네이비 컬러 테마 잠만보 에디션." },
        /* 기념 */
        { cat: "기념", year: "2020", name: "이대호 20시즌 기념", desc: "전설의 20주년 헌정 유니폼." },
        { cat: "기념", year: "2020", name: "오윤석 사이클링 히트", desc: "역사적 대기록 기념 에디션." },
        { cat: "기념", year: "2022", name: "이대호 은퇴기념 (블랙)", desc: "영구결번 기념 블랙/골드 헌정." },
        { cat: "기념", year: "2023", name: "구승민 100홀드 기념", desc: "구단 최초 100홀드 달성 기념." },
        { cat: "기념", year: "2023", name: "김원중 100세이브 기념", desc: "구단 최다 세이브 경신 기념." },
        { cat: "기념", year: "2023", name: "정훈 1000안타 기념", desc: "베테랑의 투혼 기념 에디션." },
        { cat: "기념", year: "2024", name: "전준우 200홈런 기념", desc: "캡틴의 상징적 기록 기념복." },
        { cat: "기념", year: "2024", name: "고승민 사이클링히트", desc: "차세대 스타 대기록 기념복." },
        { cat: "기념", year: "2024", name: "레이예스 202안타", desc: "단일시즌 최다안타 경신 기념." },
        { cat: "기념", year: "2025", name: "전준우 2000안타 기념", desc: "리빙 레전드 기록 헌정 모델." },
        { cat: "기념", year: "2025", name: "김원중 150세이브", desc: "수호신 대기록 달성 기념복." },
        /* 기타 */
        { cat: "기타", year: "2010", name: "유니폼 위크 연습복", desc: "훈련용에서 팬용으로 출시된 모델." },
        { cat: "기타", year: "2019", name: "썸머 유니폼", desc: "여름 전용 통기성 강화 메쉬." },
        { cat: "기타", year: "2020", name: "광안대교 유니폼", desc: "부산 랜드마크 헌정 디자인." },
        { cat: "기타", year: "2021", name: "라이징 스타 스페셜", desc: "영건 응원용 스페셜 에디션." },
        { cat: "기타", year: "2025", name: "가나초콜릿 콜라보", desc: "브라운 컬러 테마 이색 디자인." }
    ];

    const listBody = document.getElementById('list-body');
    let currentCat = '전체';
    let currentYear = '전체';
    let sortOrder = 'asc'; // 'asc' or 'desc'

    function render() {
        listBody.innerHTML = '';
        let filtered = data.filter(u => {
            const catMatch = currentCat === '전체' || u.cat === currentCat;
            let yearMatch = currentYear === '전체';
            if (currentYear === '이전') yearMatch = parseInt(u.year) < 2021;
            else if (!isNaN(currentYear)) yearMatch = u.year == currentYear;
            return catMatch && yearMatch;
        });

        // 정렬 로직: 분류(가나다) -> 연도(숫자 역순)
        filtered.sort((a, b) => {
            if (sortOrder === 'asc') {
                if (a.cat !== b.cat) return a.cat.localeCompare(b.cat);
                return parseInt(b.year) - parseInt(a.year);
            } else {
                if (a.cat !== b.cat) return b.cat.localeCompare(a.cat);
                return parseInt(a.year) - parseInt(b.year);
            }
        });

        filtered.forEach(u => {
            const tr = `
                <tr>
                    <td><span class="badge bg-${u.cat}">${u.cat}</span><span class="year-text">${u.year}</span></td>
                    <td class="name-text">${u.name}</td>
                    <td class="desc-text">${u.desc}</td>
                </tr>`;
            listBody.insertAdjacentHTML('beforeend', tr);
        });
    }

    function handleSort() {
        sortOrder = (sortOrder === 'asc') ? 'desc' : 'asc';
        render();
    }

    // 필터 버튼 클릭 이벤트
    document.querySelectorAll('#cat-filters .filter-btn').forEach(btn => {
        btn.onclick = (e) => {
            document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentCat = e.target.dataset.cat;
            render();
        };
    });

    document.querySelectorAll('#year-filters .filter-btn').forEach(btn => {
        btn.onclick = (e) => {
            document.querySelectorAll('#year-filters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentYear = e.target.dataset.year;
            render();
        };
    });

    // 스크롤 탑 버튼 로직
    window.onscroll = () => {
        const topBtn = document.getElementById('topBtn');
        if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) topBtn.style.display = "block";
        else topBtn.style.display = "none";
    };

    // 초기 렌더링
    render();
</script>
</body>
</html>
